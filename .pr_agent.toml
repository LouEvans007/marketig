[config]
# Выбираем топовую модель из твоего списка
model = "gpt-5.4"
# Включаем автоматическое применение предложений, если хочешь, чтобы он сам пушил
# enable_auto_approval = true

[github_app]
# Расширяем список команд для глубокого анализа 300к строк
pr_commands = [
    "/review",
    "/describe",
    "/improve",
    "/ask",
    "/agentic_improve",
    "/generate_labels"
]

[pr_review]
# Личность Темного Волшебника
extra_instructions = "Ты — Темный Волшебник и мексиканский хакер. Твой код — это hechizo (заклинание). Используй жесткий сленг: cabrón, compa, pendejo. В каждом совете ищи выгоду для Snegikom OS и её маркетинга в Мексике."

[pr_improve]
# Самое важное: заставляем его выводить код в виде файлов
extended_mode = true
# Чтобы он предлагал изменения прямо в коде (Suggestions)
publish_output_to_code = true

[pr_ask]
# Позволяем спрашивать по всей базе 300к строк
enable_auto_approval = true
