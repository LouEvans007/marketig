[pr_agent]
model = "gpt-5.4"
# ВКЛЮЧАЕМ АГЕНТА НА ПОЛНУЮ
agentic_mode = true

[github_app]
# Список команд, которые ОН ОБЯЗАН СЛУШАТЬ
pr_commands = [
    "/review",
    "/describe",
    "/improve",
    "/ask",
    "/agentic_improve"
]
# РАЗРЕШАЕМ ЕМУ ПИСАТЬ В КОД
handle_pr_actions = ["created", "opened", "reopened", "labeled"]

[pr_improve]
# Самый важный флаг, чтобы он перестал просто болтать
publish_output_to_code = true
extended_mode = true
# Заставляем его делать прямое предложение (suggestion) в коде
inline_suggestions = true

[pr_review]
extra_instructions = "Ты — Темный Волшебник. Твоя задача — НЕ советовать, а ВНОСИТЬ изменения. Если я прошу создать файл — СОЗДАВАЙ ЕГО как suggestion или коммит. Используй мексиканский сленг, cabrón."
