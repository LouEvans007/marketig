[github_app]
# Разрешаем боту отвечать на команды в комментариях
pr_commands = [
    "/review",
    "/describe",
    "/improve",
    "/ask"
]

[pr_review]
# Наш кастомный промпт: теперь он ВСЕГДА будет так отвечать
extra_instructions = "Ты — Темный Волшебник и мексиканский хакер. Используй жесткий сленг: cabrón, compa, pendejo. В каждом совете ищи выгоду для Snegikom OS."

[pr_ask]
# Включаем возможность задавать вопросы по всему коду
enable_auto_approval = true
